<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Cold-Chain Calculator · Powered by NanoFreeze</title>
  <meta name="description" content="Calcula cuánto recupera tu ruta cuando las capas frías de NanoFreeze reducen la merma en transporte. Open source, MIT." />
  <link rel="icon" href="./nanofreeze-logo.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    // Same contract as `themeInitScript` in @nanofreeze/theme: resolve the
    // theme BEFORE first paint (localStorage "theme" = light | dark | system,
    // falling back to the OS preference) and put `.dark` on <html>, so a
    // dark-preferring viewer never sees a flash of light. Runs in <head>,
    // synchronously, on purpose — do not defer it.
    (function () {
      try {
        var stored = localStorage.getItem("theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        var isDark = stored === "dark" || ((stored === "system" || !stored) && prefersDark);
        document.documentElement.classList.toggle("dark", isDark);
        document.documentElement.style.colorScheme = isDark ? "dark" : "light";
        var locale = localStorage.getItem("locale");
        if (locale !== "es" && locale !== "en") {
          locale = (navigator.language || "es").toLowerCase().startsWith("en") ? "en" : "es";
        }
        document.documentElement.lang = locale;
      } catch {}
    })();
  </script>

  <style>
    /* Design tokens copied from @nanofreeze/theme (theme.css) — light in
       :root, dark in .dark, exactly as the apps do it. Copied and not imported
       because this page ships with no build step; when the palette moves in the
       package, mirror it here. */
    :root {
      --canvas: #eef0f3;
      --surface: #ffffff;
      --surface-hover: #f6f7f9;
      --fg: #0a0c0f;
      --fg-muted: #6b7178;
      --fg-subtle: #9aa1a9;
      --fg-label: #3a4048;
      --border: #e2e5ea;
      --border-strong: #d1d6dd;
      --primary: #2b6e89;
      --primary-hover: #225b73;
      --primary-fg: #ffffff;
      --primary-soft: rgba(43, 110, 137, .08);
      --primary-soft-border: rgba(43, 110, 137, .3);
      --danger: #b3261e;
      --radius: 0; /* the v2 design system is squared, not rounded */
    }
    .dark {
      --canvas: #07080a;
      --surface: #0d0f13;
      --surface-hover: #14171c;
      --fg: #e8ebef;
      --fg-muted: #868d97;
      --fg-subtle: #565c66;
      --fg-label: #b4bac2;
      --border: #1b1f26;
      --border-strong: #262b33;
      --primary: #3c95b8;
      --primary-hover: #5aabca;
      --primary-fg: #07080a;
      --primary-soft: rgba(60, 149, 184, .12);
      --primary-soft-border: rgba(60, 149, 184, .35);
      --danger: #e3576b;
    }
    /* The wordmark is black artwork — invert it in dark mode. */
    .dark .wordmark { filter: invert(1) brightness(1.6); }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Geist, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      font-size: 15px; line-height: 1.55;
      color: var(--fg); background: var(--canvas);
      -webkit-font-smoothing: antialiased;
    }
    /* One container for every band, so the logo, the headline and the cards
       all share a left edge. (They did not before — that was the "looks off".) */
    .wrap { max-width: 1180px; margin: 0 auto; padding-inline: 24px; }

    /* ── Top bar ─────────────────────────────────────────────────── */
    .topbar { background: var(--surface); border-bottom: 1px solid var(--border); }
    .topbar .wrap { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding-block: 10px; }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .wordmark { display: block; width: 116px; height: auto; }

    .chip {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      min-height: 44px; padding: 0 12px; font: inherit; font-size: 13px; font-weight: 500;
      background: var(--surface); color: var(--fg);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
      text-decoration: none; cursor: pointer; white-space: nowrap;
    }
    .chip:hover { background: var(--surface-hover); }
    .chip svg { flex: none; }
    .chip .sep { color: var(--fg-subtle); border-left: 1px solid var(--border); padding-left: 7px; }
    @media (max-width: 560px) { .chip .txt { display: none; } .chip { padding: 0 10px; } }

    /* ── Hero ────────────────────────────────────────────────────── */
    .hero { background: var(--surface); border-bottom: 1px solid var(--border); }
    .hero .wrap { padding-block: 28px 24px; display: flex; align-items: flex-start; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
    .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--primary); margin: 0 0 6px; }
    h1 { margin: 0; font-size: clamp(1.55rem, 4vw, 2.15rem); font-weight: 700; letter-spacing: -.02em; }
    .hero p { margin: 6px 0 0; color: var(--fg-muted); max-width: 44rem; }
    .stepcount { color: var(--fg-muted); font-size: 14px; white-space: nowrap; }

    /* ── Sticky KPI rail ─────────────────────────────────────────── */
    .metrics { position: sticky; top: 0; z-index: 10; background: var(--canvas); border-bottom: 1px solid var(--border); }
    .metrics .wrap { padding-block: 14px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
    @media (min-width: 768px) { .metrics .wrap { grid-template-columns: repeat(4, 1fr); } }
    .metric { background: var(--surface); border: 1px solid var(--border); padding: 10px 14px; }
    .metric.accent { background: var(--primary-soft); border-color: var(--primary-soft-border); }
    .metric .lab { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-muted); }
    .metric .val { margin-top: 2px; font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; }
    .metric.accent .val { color: var(--primary); }

    .metric .val.pending { color: var(--fg-subtle); }
    .metrics-foot { padding-bottom: 12px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .pending-hint { margin: 0; font-size: 12px; color: var(--fg-subtle); }
    .linkbtn {
      display: inline-flex; align-items: center; gap: 6px; min-height: 44px;
      background: none; border: 0; padding: 0; font: inherit; font-size: 13px; font-weight: 500;
      color: var(--primary); cursor: pointer; margin-left: auto;
    }
    .linkbtn:hover { text-decoration: underline; }

    /* ── Assumptions drawer ──────────────────────────────────────── */
    .scrim { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 40; }
    .drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 50;
      width: min(560px, 100%); display: flex; flex-direction: column;
      background: var(--surface); border-left: 1px solid var(--border);
    }
    .drawer[hidden] { display: none; }
    .drawer-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; padding: 20px 24px; border-bottom: 1px solid var(--border); }
    .drawer-head h2 { margin: 0; font-size: 18px; font-weight: 700; }
    .drawer-head p { margin: 6px 0 0; font-size: 13px; color: var(--fg-muted); }
    .drawer-body { flex: 1; overflow-y: auto; padding: 8px 24px 24px; -webkit-overflow-scrolling: touch; }
    .drawer-foot { padding: 14px 24px; border-top: 1px solid var(--border); }
    .assumption { padding: 16px 0; border-bottom: 1px solid var(--border); }
    .assumption:last-child { border-bottom: 0; }
    .assumption-top { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
    .assumption-name { font-weight: 600; font-size: 14px; }
    .assumption-unit { font-size: 12px; color: var(--fg-subtle); white-space: nowrap; }
    .assumption p { margin: 6px 0 10px; font-size: 13px; color: var(--fg-muted); }
    .assumption .src { font-size: 12px; color: var(--fg-subtle); font-style: italic; }
    .assumption-row { display: flex; align-items: center; gap: 10px; }
    .assumption-row input { max-width: 190px; }
    .edited { font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--primary); }

    /* ── Layout ──────────────────────────────────────────────────── */
    main { display: grid; gap: 24px; align-items: start; padding-block: 24px 32px; }
    @media (min-width: 900px) { main { grid-template-columns: 250px 1fr; } }
    /* Grid children default to min-width:auto, so the wide results table would
       push the page sideways instead of scrolling inside .scroll. */
    main > *, .card { min-width: 0; }

    /* ── Step rail ───────────────────────────────────────────────── */
    .rail { display: grid; gap: 8px; }
    .rail button {
      display: flex; align-items: center; gap: 12px; width: 100%;
      min-height: 52px; padding: 0 14px; text-align: left; font: inherit;
      background: var(--surface); border: 1px solid var(--border); color: var(--fg-subtle);
      cursor: pointer;
    }
    .rail button:hover:not(:disabled) { background: var(--surface-hover); }
    .rail button:disabled { cursor: not-allowed; }
    .rail button .n {
      display: grid; place-items: center; width: 26px; height: 26px; flex: none;
      border-radius: 999px; background: var(--canvas); color: var(--fg-muted);
      font-size: 12px; font-weight: 600;
    }
    .rail button[aria-current="step"] { border-color: var(--primary); background: var(--primary-soft); color: var(--fg); font-weight: 600; }
    .rail button[aria-current="step"] .n,
    .rail button.done .n { background: var(--primary); color: var(--primary-fg); }
    .rail button.done { color: var(--fg); }

    /* ── Cards + fields ──────────────────────────────────────────── */
    .steplead { color: var(--fg-muted); margin: 0 0 16px; }
    .card { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 16px; }
    .card h2 { margin: 0 0 14px; font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-muted); }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; }
    @media (min-width: 640px) { .grid { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); } }
    label { display: block; font-size: 13px; color: var(--fg-label); margin-bottom: 5px; font-weight: 500; }
    .control { position: relative; display: flex; align-items: center; }
    input[type=number], input[type=text], select {
      width: 100%; min-height: 44px; padding: 8px 12px; font: inherit;
      color: var(--fg); background: var(--surface);
      border: 1px solid var(--border-strong); border-radius: var(--radius);
    }
    input:focus, select:focus, button:focus-visible, a:focus-visible { outline: 2px solid var(--primary); outline-offset: -1px; }
    .control .unit { position: absolute; right: 12px; font-size: 12px; color: var(--fg-subtle); pointer-events: none; }
    .control:has(.unit) input { padding-right: 52px; }
    .note { margin: 6px 0 0; font-size: 12px; color: var(--fg-subtle); }
    .switch { display: flex; align-items: center; gap: 10px; min-height: 44px; }
    .switch input { width: 18px; height: 18px; accent-color: var(--primary); }
    .switch label { margin: 0; }

    .choices { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; }
    .choice {
      min-height: 44px; padding: 14px; text-align: left; font: inherit; cursor: pointer;
      background: var(--surface); border: 1px solid var(--border-strong); color: var(--fg);
    }
    .choice:hover { background: var(--surface-hover); }
    .choice[aria-pressed="true"] { border-color: var(--primary); background: var(--primary-soft); }
    .choice b { display: block; font-weight: 600; }
    .choice span { font-size: 12px; color: var(--fg-muted); }

    .derived { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 16px; border-top: 1px solid var(--border); padding-top: 16px; margin-top: 4px; }
    .derived .lab { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-muted); }
    .derived .val { margin-top: 2px; font-size: 17px; font-weight: 600; font-variant-numeric: tabular-nums; }

    .scroll { overflow-x: auto; }
    table { width: 100%; min-width: 520px; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: right; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    th:first-child, td:first-child { text-align: left; }
    thead th { font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--fg-muted); }
    tr.total td { background: var(--primary-soft); font-weight: 700; }
    td.neg { color: var(--danger); }

    /* ── Buttons / nav ───────────────────────────────────────────── */
    .nav { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      min-height: 44px; padding: 0 18px; font: inherit; font-weight: 500;
      border: 1px solid var(--border-strong); background: var(--surface); color: var(--fg);
      border-radius: var(--radius); cursor: pointer; text-decoration: none;
    }
    .btn:hover { background: var(--surface-hover); }
    .btn-primary { background: var(--primary); border-color: var(--primary); color: var(--primary-fg); }
    .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .ctas { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 640px) { .ctas { grid-template-columns: 1fr 1fr; } }

    /* ── Footer ──────────────────────────────────────────────────── */
    footer { background: var(--surface); border-top: 1px solid var(--border); }
    footer .wrap { padding-block: 32px; display: grid; gap: 28px; }
    @media (min-width: 760px) { footer .wrap { grid-template-columns: 1.4fr 1fr 1fr; } }
    footer h3 { margin: 0 0 10px; font-size: 11px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--fg-muted); }
    footer p { margin: 0 0 10px; color: var(--fg-muted); font-size: 13px; max-width: 34rem; }
    footer ul { list-style: none; margin: 0; padding: 0; }
    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    footer li a, .social a { display: inline-flex; align-items: center; gap: 8px; min-height: 44px; }
    .social { display: flex; gap: 14px; align-items: center; }
    .social a { color: var(--fg-muted); }
    .social a:hover { color: var(--primary); }
    .legal { border-top: 1px solid var(--border); }
    .legal .wrap { padding-block: 16px 28px; color: var(--fg-subtle); font-size: 12px; display: flex; gap: 8px 20px; flex-wrap: wrap; justify-content: space-between; }

    /* ── Print: "download the case" is print-to-PDF, no library ───── */
    @media print {
      .no-print, .rail, .nav, .ctas, .topbar, footer, .legal { display: none !important; }
      .metrics { position: static; border: 0; }
      body { background: #fff; color: #000; font-size: 12px; }
      main { display: block; padding: 0; }
      .card { break-inside: avoid; border-color: #ccc; }
      table { min-width: 0; }
    }
  </style>
</head>

  <script type="module">

        )),
        card(s.packaging, el("div", { class: "choices" },
          tile(s.cajas, s.cajasHint, scenario.packaging === "cajas", () => selectScenario({ packaging: "cajas" })),
          tile(s.pallets, s.palletsHint, scenario.packaging === "pallets", () => selectScenario({ packaging: "pallets" })),
        )),
      );
    }

    function layerReadouts(out, extra) {
      const s = t(), c = carrierWord();
      return derivedList([
        ...extra,
        [s.layerCostPer(c), money(out.layers.costPerCarrier.cop)],
        [s.layerCostPerUnit, money(out.layers.costPerProductUnit.cop)],
        [s.extraWeightPer(c), `${num(out.layers.weightPerCarrierKg, 2)} kg`],
      ]);
    }

    function stepProduct(out) {
      const s = t(), c = carrierWord();
      const cards = [
        card(null,
          textField("product.name", s.product, { placeholder: s.productPlaceholder, id: "f-name" }),
          el("div", { style: "height:14px" }),
          grid(
            numberField("product.unitsPerCarrier", s.unitsPer(c), { step: "1", id: "f-units" }),
            numberField("product.productKgPerCarrier", s.kgPer(c), { step: "0.1", unit: "kg", id: "f-kg" }),
            numberField("product.valuePerCarrierCop", s.valuePer(c), { step: "1000", unit: "COP", id: "f-value" }),
          ),
        ),
      ];

      if (state.layers.packaging === "cajas") {
        // Guided sizing — a prospect knows their box length and how heat-sensitive
        // the product is, not how many strips/layers that implies. The engine's
        // own helpers (sizing.ts) derive the technical numbers.
        const strips = stripsPerLayerForBoxLength(state.layers.boxLengthCm ?? 0);
        const layers = layersForSensitivity(state.layers.heatSensitivity ?? "sensible");
        state.layers.stripsPerLayer = strips;
        state.layers.layersPerBox = layers;
        cards.push(card(null,
          grid(
            numberField("layers.boxLengthCm", s.boxLength, { step: "1", unit: "cm", id: "f-box", note: s.boxLengthNote }),
            selectField(s.heat, [["sensible", s.heatLow], ["altamente-sensible", s.heatHigh]],
              state.layers.heatSensitivity ?? "sensible",
              (v) => { state.layers.heatSensitivity = v; render(); }, "f-heat"),
          ),
          layerReadouts(out, [[s.stripsPerLayer, num(strips)], [s.layersPerBox, num(layers)]]),
        ));
      } else {
        cards.push(card(null,
          grid(
            numberField("layers.layersPerPallet", s.layersPerPallet, { step: "1", id: "f-lpp" }),
            numberField("layers.costPerPalletLayerCop", s.costPerPalletLayer, { step: "1", unit: "COP", id: "f-cpl", note: s.costPerPalletLayerNote }),
            numberField("layers.weightPerPalletLayerKg", s.weightPerPalletLayer, { step: "0.1", unit: "kg", id: "f-wpl" }),
          ),
          layerReadouts(out, []),
        ));
      }

      return el("div", {}, el("p", { class: "steplead" }, s.productLead(carrierArticle(), c)), ...cards);
    }

    function stepLogistics(out) {
      const s = t(), cs = carriersWord();
      if (state.logistics.market === "nacional") {
        const reuse = out.reuse;
        return el("div", {},
          el("p", { class: "steplead" }, s.logisticsLeadNacional),
          card(s.transport, grid(
            numberField("logistics.reeferTruckCostCop", s.reeferCost, { step: "10000", unit: "COP", id: "f-truck" }),
            numberField("logistics.reeferPremiumPct", s.reeferPremium, { step: "1", scale: 100, unit: "%", id: "f-prem" }),
            numberField("logistics.carriersPerTruck", s.carriersPerTruck(cs), { step: "1", id: "f-cpt" }),
            numberField("logistics.tripsPerMonth", s.tripsPerMonth, { step: "1", id: "f-trips" }),
            numberField("logistics.distanceKm", s.distance, { step: "10", unit: "km", id: "f-dist" }),
            numberField("logistics.reeferHoursPerTrip", s.reeferHours, { step: "0.5", unit: "h", id: "f-hrs" }),
          )),
          card(s.reuseTitle,
            switchField("logistics.reuse.hasReturnLogistics", s.hasReturn, "f-ret"),
            el("div", { style: "height:8px" }),
            grid(numberField("logistics.reuse.outboundDays", s.outboundDays, { step: "1", id: "f-out" })),
            reuse ? derivedList([
              [s.usesPerLayer, num(reuse.usesPerLayer)],
              [s.setsToBuy, num(reuse.setsToBuy)],
              [s.investment, money(reuse.investment.cop)],
              [s.amortized, money(reuse.amortizedPerTrip.cop)],
            ]) : el("div"),
          ),
        );
      }
      const land = state.logistics.landLeg?.replaceReeferTruck;
      return el("div", {},
        el("p", { class: "steplead" }, s.logisticsLeadExport),
        card(s.airfreight, grid(
          numberField("logistics.airRatePerKgCop", s.airRate, { step: "100", unit: "COP/kg", id: "f-air" }),
          numberField("logistics.carriersPerShipment", s.carriersPerShipment(cs), { step: "1", id: "f-cps" }),
          numberField("logistics.shipmentsPerMonth", s.shipmentsPerMonth, { step: "1", id: "f-spm" }),
          numberField("logistics.airDistanceKm", s.airDistance, { step: "100", unit: "km", id: "f-adist" }),
        )),
        card(s.landLeg,
          switchField("logistics.landLeg.replaceReeferTruck", s.replaceLand, "f-land"),
          land ? el("div", {}, el("div", { style: "height:8px" }), grid(
            numberField("logistics.landLeg.carriersPerTruck", s.carriersPerTruck(cs), { step: "1", id: "f-lcpt" }),
            numberField("logistics.landLeg.reeferTruckCostCop", s.reeferCost, { step: "10000", unit: "COP", id: "f-ltruck" }),
            numberField("logistics.landLeg.reeferPremiumPct", s.reeferPremium, { step: "1", scale: 100, unit: "%", id: "f-lprem" }),
            numberField("logistics.landLeg.reeferHoursPerTruck", s.reeferHoursTruck, { step: "0.5", unit: "h", id: "f-lhrs" }),
          )) : el("div"),
        ),
      );
    }

    function stepSpoilage(out) {
      const s = t();
      const recovered = state.spoilage.spoilagePct * (state.spoilage.coldChainSharePct - state.spoilage.residualSharePct);
      return el("div", {},
        el("p", { class: "steplead" }, s.spoilageLead),
        card(null,
          grid(
            numberField("spoilage.spoilagePct", s.spoilageTotal, { step: "0.5", scale: 100, unit: "%", id: "f-sp" }),
            numberField("spoilage.coldChainSharePct", s.coldChainShare, { step: "0.5", scale: 100, unit: "%", id: "f-cc" }),
            numberField("spoilage.residualSharePct", s.residualShare, { step: "0.5", scale: 100, unit: "%", id: "f-res" }),
          ),
          derivedList([
            [s.recoveredFraction, pct(recovered)],
            [s.recoveredValuePer(eventWord(out)), money(out.monetary.recoveredValue.perEvent.cop)],
            [s.perishablesSaved, `${num(out.perishables.annualKg)} kg`],
          ]),
        ),
      );
    }

    function stepResults(out) {
      const s = t(), event = eventWord(out), m = out.monetary;
      const investment = out.reuse ? out.reuse.investment : m.nfInvestment.perEvent;

      const cols = [["perEvent", s.perEvent(event)], ["perMonth", s.perMonth], ["annual", s.annual]];
      if (out.horizonMonths !== null) cols.push(["perHorizon", s.horizon(num(out.horizonMonths, 1))]);

      const rows = [
        [s.rowTransport, m.transportSavings, false],
        [s.rowRecovered, m.recoveredValue, false],
        [s.rowInvestment, m.nfInvestment, true],
        [s.rowExtra, m.extraCost, true],
        [s.rowTotal, m.total, false],
      ];

      const table = el("table");
      table.innerHTML = `
        <thead><tr><th>${s.concept}</th>${cols.map(([, l]) => `<th>${l}</th>`).join("")}</tr></thead>
        <tbody>${rows.map(([label, flow, isCost]) => {
          const cells = cols.map(([key]) => {
            const v = flow[key];
            if (!v) return "<td>—</td>";
            // Costs are subtracted by the engine; render them negative so the
            // column reads as a sum down to the total.
            const value = isCost ? -v.cop : v.cop;
            return `<td class="${value < 0 ? "neg" : ""}">${money(value)}</td>`;
          }).join("");
          return `<tr class="${label === s.rowTotal ? "total" : ""}"><td>${label}</td>${cells}</tr>`;
        }).join("")}</tbody>`;

      return el("div", {},
        el("p", { class: "steplead" }, s.resultsLead(num(out.eventsPerMonth), event)),
        card(s.summary, derivedList([
          [s.benefitPer(event), money(m.total.perEvent.cop)],
          [s.benefitAnnual, `${money(m.total.annual.cop)} · ${usd(m.total.annual.usd)}`],
          [s.investmentLayers, money(investment.cop)],
          [s.returnLabel, `${roiFmt(m.roi)} — ${m.positiveFromFirstEvent ? s.positiveFirst(event) : s.notYet(event)}`],
          [s.co2Annual, `${num(out.environmental.annualTons, 1)} t`],
          [s.perishablesSaved, `${num(out.perishables.annualKg)} kg · ${num(out.perishables.annualUnits)} ${s.units}`],
        ])),
        card(s.detail, el("div", { class: "scroll" }, table),
          el("p", { class: "note" }, s.assumptionsNote(
            money(out.assumptions.copPerUsd),
            m.savingsPctVsReefer !== null ? pct(m.savingsPctVsReefer) : null,
          ))),
        el("div", { class: "ctas no-print" },
          el("button", { class: "btn btn-primary", type: "button", onclick: () => window.print() }, s.downloadCase),
          el("a", { class: "btn", href: "https://nanofreeze.tech", target: "_blank", rel: "noopener" }, s.visitNanoFreeze),
        ),
      );
    }

    // ── Render ────────────────────────────────────────────────────
    function renderMetrics(out) {
      const s = t();
      // A scenario preset seeds the fields with a worked example so the form is
      // never empty — but until the prospect has actually walked their own
      // numbers through the steps, those figures are the example's, not theirs.
      // Showing them as "your annual savings" would be a lie, so the rail stays
      // blank until they reach Results once; from then on it updates live.
      const metrics = [
        [s.metrics.savings, money(out.monetary.total.annual.cop), true],
        [s.metrics.co2, num(out.environmental.annualTons, 1), false],
        [s.metrics.perishables, num(out.perishables.annualKg), false],
        [s.metrics.roi, roiFmt(out.monetary.roi), false],
      ];
      document.getElementById("metrics").innerHTML = metrics
        .map(([lab, val, accent]) => `<div class="metric${accent && revealed ? " accent" : ""}">
          <div class="lab">${lab}</div>
          <div class="val${revealed ? "" : " pending"}">${revealed ? val : "—"}</div>
        </div>`)
        .join("");
      const hint = document.getElementById("metrics-hint");
      hint.textContent = revealed ? "" : s.metricsPending;
      hint.hidden = revealed;
    }

    function renderRail() {
      const rail = document.getElementById("rail");
      rail.innerHTML = "";
      t().steps.forEach((s, i) => {
        const done = i < stepIndex;
        const b = el("button", {
          type: "button", class: done ? "done" : "",
          "aria-current": i === stepIndex ? "step" : null,
          onclick: () => { if (i <= maxReached) { stepIndex = i; render(); } },
        }, el("span", { class: "n" }, done ? "✓" : String(i + 1)), s.label);
        if (i > maxReached) b.disabled = true;
        rail.append(b);
      });
    }

    // ── Assumptions drawer ────────────────────────────────────────
    // `CapasInput.assumptions` is a partial override of CAPAS_DEFAULT_ASSUMPTIONS —
    // the engine merges it, so an empty object means "all defaults".
    function renderAssumptions() {
      const s = t();
      document.getElementById("drawer-title").textContent = s.assumptionsTitle;
      document.getElementById("drawer-intro").textContent = s.assumptionsIntro;
      document.getElementById("assumptions-close").textContent = s.close;
      document.getElementById("assumptions-open-label").textContent = s.viewAssumptions;

      const overrides = state.assumptions ?? {};
      const resetAll = document.getElementById("assumptions-reset");
      resetAll.textContent = s.resetAll;
      resetAll.disabled = Object.keys(overrides).length === 0;
      resetAll.onclick = () => { delete state.assumptions; render(); };

      const body = document.getElementById("drawer-body");
      body.innerHTML = "";
      for (const meta of CAPAS_ASSUMPTIONS_META) {
        const isEdited = Object.prototype.hasOwnProperty.call(overrides, meta.key);
        const value = isEdited ? overrides[meta.key] : CAPAS_DEFAULT_ASSUMPTIONS[meta.key];
        const label = locale === "en" ? meta.labelEn : meta.labelEs;
        const unit = locale === "en" ? meta.unitEn : meta.unitEs;
        const explain = locale === "en" ? meta.explainEn : meta.explainEs;

        const row = el("div", { class: "assumption" });
        const top = el("div", { class: "assumption-top" },
          el("span", { class: "assumption-name" }, label),
          el("span", { class: "assumption-unit" }, unit));
        row.append(top, el("p", {}, explain));

        const input = el("input", { type: "number", step: "any", id: `a-${meta.key}`, inputmode: "decimal",
          "aria-label": `${label} (${unit})` });
        input.value = String(value);
        input.oninput = () => {
          state.assumptions = { ...(state.assumptions ?? {}), [meta.key]: Number(input.value) };
          render({ keepFocus: `a-${meta.key}` });
        };
        const controls = el("div", { class: "assumption-row" }, el("div", { class: "control" }, input));
        if (isEdited) {
          controls.append(el("span", { class: "edited" }, s.assumptionsEdited));
          controls.append(el("button", { class: "btn", type: "button", onclick: () => {
            const next = { ...(state.assumptions ?? {}) };
            delete next[meta.key];
            if (Object.keys(next).length === 0) delete state.assumptions; else state.assumptions = next;
            render();
          } }, s.resetOne));
        }
        row.append(controls);
        if (meta.source) row.append(el("p", { class: "src" }, `${s.sourceLabel}: ${meta.source}`));
        body.append(row);
      }

      const open = assumptionsOpen;
      document.getElementById("drawer").hidden = !open;
      document.getElementById("scrim").hidden = !open;
      document.body.style.overflow = open ? "hidden" : "";
    }

    function setAssumptionsOpen(open) { assumptionsOpen = open; renderAssumptions(); }
    document.getElementById("assumptions-open").onclick = () => setAssumptionsOpen(true);
    document.getElementById("assumptions-close").onclick = () => setAssumptionsOpen(false);
    document.getElementById("scrim").onclick = () => setAssumptionsOpen(false);
    document.addEventListener("keydown", (e) => { if (e.key === "Escape" && assumptionsOpen) setAssumptionsOpen(false); });

    function renderFooter() {
      const s = t();
      const set = (id, text) => { document.getElementById(id).textContent = text; };
      set("f-about-h", s.fAboutH); set("f-about-p", s.fAboutP); set("f-disclaimer", s.fDisclaimer);
      set("f-product-h", s.fProductH); set("f-site", s.fSite); set("f-source", s.fSource);
      set("f-follow-h", s.fFollowH); set("f-copyright", s.fCopyright); set("f-privacy", s.fPrivacy);
      document.getElementById("locale-label").textContent = locale.toUpperCase();
      document.getElementById("locale-toggle").setAttribute("aria-label",
        locale === "es" ? "Switch to English" : "Cambiar a español");
    }

    const VIEWS = [stepScenario, stepProduct, stepLogistics, stepSpoilage, stepResults];

    function render({ keepFocus } = {}) {
      const out = computeCapas(state);
      const s = t();
      const step = s.steps[stepIndex];

      document.getElementById("eyebrow").textContent = s.eyebrow;
      document.getElementById("step-title").textContent = step.label;
      document.getElementById("step-desc").textContent = step.desc;
      document.getElementById("step-count").textContent = s.stepOf(stepIndex + 1, s.steps.length);
      renderMetrics(out);
      renderRail();
      renderFooter();
      renderAssumptions();

      const body = document.getElementById("step-body");
      body.innerHTML = "";
      body.append(VIEWS[stepIndex](out));

      const back = document.getElementById("back");
      const next = document.getElementById("next");
      back.textContent = s.back;
      back.disabled = stepIndex === 0;
      back.onclick = () => { stepIndex = Math.max(0, stepIndex - 1); render(); };
      next.style.display = step.cta ? "" : "none";
      next.textContent = step.cta ?? "";
      next.onclick = () => {
        stepIndex = Math.min(s.steps.length - 1, stepIndex + 1);
        maxReached = Math.max(maxReached, stepIndex);
        // Reaching Results means they've now confirmed every input — from here
        // the KPI rail is theirs, and it tracks their edits live.
        if (stepIndex === s.steps.length - 1) revealed = true;
        window.scrollTo({ top: 0, behavior: "smooth" });
        render();
      };

      // Typing re-renders the step, which would drop the caret — restore it.
      if (keepFocus) {
        const field = document.getElementById(keepFocus);
        if (field) {
          field.focus();
          if (field.type !== "number") field.setSelectionRange(field.value.length, field.value.length);
        }
      }
    }

    applyTheme();
    render();
  </script>
</body>
</html>
