name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages.
#
# The site lands at https://<owner>.github.io/<repo>/, a SUBPATH — so the build
# runs with BASE_PATH set to "/<repo>", which next.config.ts turns into
# basePath + assetPrefix. Every other build (local dev, the CloudFront/S3 deploy
# driven by the monorepo) leaves BASE_PATH unset and serves at the domain root.
#
# One-time setup by a repo admin: Settings → Pages → Build and deployment →
# Source = "GitHub Actions". Until that's set, this workflow's deploy step fails
# with "Pages site not found" — the build + artifact steps still pass.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for the Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; don't cancel an in-flight one (a half-published
# site is worse than a slightly stale one).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # `npm install`, not `npm ci`: next@16 pins @swc/helpers to an exact
      # version while a transitive dep wants a higher one, so the ideal tree has
      # two copies — and which copies land in the lock depends on the npm version
      # that wrote it. `npm ci` fails the build on any such drift; `npm install`
      # reconciles it in place (the committed lock is still honoured when
      # consistent). For a static-site deploy that trade is worth it.
      - name: Install
        run: npm install --no-audit --no-fund

      - name: Build static export
        env:
          # basePath = "/<repo>". Derived from the repository name so a fork
          # deploys to its own Pages URL without editing this file.
          BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
